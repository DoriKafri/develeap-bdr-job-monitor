name: HubSpot CRM Sync

on:
  # Run every 2 hours during business hours (Israel time UTC+2)
  schedule:
    - cron: '30 6-16 */2 * *'   # Every 2h from ~8:30-18:30 IST

  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hubspot-sync
  cancel-in-progress: false

jobs:
  sync-crm:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Only run if HUBSPOT_TOKEN secret exists
    env:
      HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}

    steps:
      - name: Check if HubSpot is configured
        run: |
          if [ -z "$HUBSPOT_TOKEN" ]; then
            echo "HUBSPOT_TOKEN secret not set, skipping"
            exit 0
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run HubSpot CRM sync
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: python sync_hubspot.py

      - name: Commit CRM data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crm_data.json
          git diff --staged --quiet || git commit -m "chore: sync HubSpot CRM data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
