name: CRM & Enrichment Sync

on:
  schedule:
    - cron: '30 6,8,10,12,14,16 * * *'   # Every 2h from ~8:30-18:30 IST

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hubspot-sync
  cancel-in-progress: false

jobs:
  sync-crm:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
      APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}

    steps:
      - name: Check if any integration is configured
        run: |
          if [ -z "$HUBSPOT_TOKEN" ] && [ -z "$APOLLO_API_KEY" ]; then
            echo "No integration secrets set, skipping"
            exit 0
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run HubSpot CRM sync
        if: env.HUBSPOT_TOKEN != ''
        env:
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: python sync_hubspot.py

      - name: Run Apollo.io enrichment
        if: env.APOLLO_API_KEY != ''
        env:
          APOLLO_WEBHOOK_URL: ${{ secrets.APOLLO_WEBHOOK_URL }}
        run: python enrich_apollo.py

      - name: Process outreach queue
        if: env.HUBSPOT_TOKEN != ''
        env:
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python process_queue.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crm_data.json apollo_data.json linkedin_queue.json queue_execution_log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: sync CRM & enrichment data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
