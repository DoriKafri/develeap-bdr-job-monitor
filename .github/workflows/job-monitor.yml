name: Develeap BDR Job Monitor

on:
  schedule:
    - cron: '0 6,8,10,12,14,16 * * *'   # Every 2h daytime (~8:00-18:00 IST)

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: job-monitor
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run job monitor update
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          DASHBOARD_PATH: dashboard/index.html
        run: python update_jobs.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stash our generated files, pull remote, re-apply ours on top
          cp dashboard/index.html /tmp/dashboard_gen.html
          cp docs/index.html /tmp/docs_gen.html
          cp slack_posted.json /tmp/slack_posted_gen.json 2>/dev/null || true
          git checkout -- . 2>/dev/null || true
          git pull origin main || true
          # Restore our generated files (they're always the freshest)
          cp /tmp/dashboard_gen.html dashboard/index.html
          cp /tmp/docs_gen.html docs/index.html
          cp /tmp/slack_posted_gen.json slack_posted.json 2>/dev/null || true
          git add dashboard/index.html docs/index.html slack_posted.json
          git diff --staged --quiet || git commit -m "chore: update job listings $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"⚠️ *BDR Job Monitor FAILED* ⚠️\nRun #${{ github.run_number }} failed at $(date -u '+%Y-%m-%d %H:%M UTC')\nCheck: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
