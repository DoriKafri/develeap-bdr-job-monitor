<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDR Analytics  - Listings by Category Over Time</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --dim: #8b949e; --accent: #58a6ff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
  h1 { font-size: 1.5em; margin-bottom: 4px; }
  .subtitle { color: var(--dim); font-size: 0.9em; margin-bottom: 20px; }
  .controls { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .controls label { font-size: 0.85em; color: var(--dim); }
  select, button { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 0.85em; cursor: pointer; }
  select:hover, button:hover { border-color: var(--accent); }
  .range-bar { display: flex; gap: 4px; margin-bottom: 20px; }
  .range-btn { background: var(--card); color: var(--dim); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 0.85em; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .range-btn:hover { border-color: var(--accent); color: var(--text); }
  .range-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chart-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; position: relative; }
  .chart-container canvas { max-height: 450px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
  .stat-num { font-size: 1.6em; font-weight: 700; }
  .stat-label { font-size: 0.75em; color: var(--dim); margin-top: 2px; }
  .legend-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .legend-chip { padding: 4px 10px; border-radius: 16px; font-size: 0.8em; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
  .legend-chip:hover { opacity: 0.8; }
  .legend-chip.muted { opacity: 0.3; }
  .updated { font-size: 0.75em; color: var(--dim); text-align: right; margin-top: 8px; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  th { text-align: left; font-size: 0.75em; color: var(--dim); text-transform: uppercase; padding: 8px; border-bottom: 1px solid var(--border); }
  td { padding: 6px 8px; border-bottom: 1px solid rgba(48,54,61,0.5); font-size: 0.85em; text-align: center; }
  td:first-child { text-align: left; font-weight: 600; }
  .table-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; overflow-x: auto; }
  td[onclick] { cursor: pointer; }
  td[onclick]:hover { text-decoration: underline; opacity: 0.8; }
</style>
</head>
<body>

<h1>BDR Analytics  - Listings by Category Over Time</h1>
<p class="subtitle">Histogram of job listings grouped by date and category. Auto-updated on each pipeline run.</p>

<div class="controls">
  <label>Chart type:</label>
  <select id="chartType" onchange="updateChart()">
    <option value="bar">Stacked Bar</option>
    <option value="line">Line</option>
    <option value="bar-grouped">Grouped Bar</option>
  </select>
  <label>Group by:</label>
  <select id="groupBy" onchange="rebuildData()">
    <option value="day">Day</option>
    <option value="week">Week</option>
    <option value="month">Month</option>
  </select>
  <button onclick="toggleAll()">Toggle All</button>
</div>

<div class="range-bar" id="rangeBar">
  <button class="range-btn" data-range="1W" onclick="setRange('1W')">1W</button>
  <button class="range-btn" data-range="1M" onclick="setRange('1M')">1M</button>
  <button class="range-btn" data-range="3M" onclick="setRange('3M')">3M</button>
  <button class="range-btn" data-range="6M" onclick="setRange('6M')">6M</button>
  <button class="range-btn" data-range="YTD" onclick="setRange('YTD')">YTD</button>
  <button class="range-btn active" data-range="MAX" onclick="setRange('MAX')">Max</button>
</div>

<div class="stats-grid" id="statsGrid"></div>
<div class="legend-row" id="legendRow"></div>

<div class="chart-container">
  <canvas id="mainChart"></canvas>
</div>

<div class="table-container">
  <h3 style="margin-bottom:8px; font-size:1em;">Raw Data Table</h3>
  <table id="dataTable"></table>
</div>

<p class="updated" id="updatedAt"></p>

<script>
//  - DATA (replaced on each pipeline run)  -
// BEGIN_HISTOGRAM_DATA
const HISTOGRAM_DATA = [{"date":"2026-03-16","agentic":0,"ai":1,"cloud":0,"data":0,"devops":0,"finops":0,"platform":0,"security":0,"sre":0},{"date":"2026-03-18","agentic":1,"ai":0,"cloud":0,"data":0,"devops":0,"finops":0,"platform":0,"security":1,"sre":0},{"date":"2026-03-19","agentic":1,"ai":15,"cloud":0,"data":0,"devops":8,"finops":2,"platform":4,"security":3,"sre":2},{"date":"2026-03-20","agentic":0,"ai":1,"cloud":0,"data":5,"devops":3,"finops":1,"platform":2,"security":1,"sre":2},{"date":"2026-03-22","agentic":0,"ai":0,"cloud":0,"data":2,"devops":5,"finops":0,"platform":1,"security":1,"sre":2},{"date":"2026-03-23","agentic":0,"ai":0,"cloud":0,"data":1,"devops":2,"finops":0,"platform":0,"security":0,"sre":0},{"date":"2026-03-24","agentic":0,"ai":2,"cloud":3,"data":0,"devops":0,"finops":0,"platform":0,"security":0,"sre":2},{"date":"2026-03-25","agentic":1,"ai":4,"cloud":1,"data":5,"devops":4,"finops":0,"platform":2,"security":3,"sre":2},{"date":"2026-03-26","agentic":0,"ai":5,"cloud":0,"data":5,"devops":4,"finops":2,"platform":1,"security":2,"sre":0},{"date":"2026-03-27","agentic":1,"ai":0,"cloud":1,"data":0,"devops":2,"finops":0,"platform":1,"security":1,"sre":0},{"date":"2026-03-29","agentic":0,"ai":1,"cloud":0,"data":0,"devops":1,"finops":0,"platform":1,"security":1,"sre":1}];
const LAST_UPDATED = "2026-03-29T09:30:00Z";
// END_HISTOGRAM_DATA

const CATEGORY_COLORS = {
  devops:   { bg: 'rgba(88,166,255,0.7)',  border: '#58a6ff' },
  ai:       { bg: 'rgba(188,140,255,0.7)', border: '#bc8cff' },
  cloud:    { bg: 'rgba(63,185,80,0.7)',   border: '#3fb950' },
  security: { bg: 'rgba(248,81,73,0.7)',   border: '#f85149' },
  sre:      { bg: 'rgba(210,153,34,0.7)',  border: '#d29922' },
  data:     { bg: 'rgba(121,192,255,0.7)', border: '#79c0ff' },
  platform: { bg: 'rgba(219,171,255,0.7)', border: '#d2a8ff' },
  finops:   { bg: 'rgba(255,166,87,0.7)',  border: '#ffa657' },
  agentic:  { bg: 'rgba(255,123,114,0.7)', border: '#ff7b72' },
};

const CATEGORIES = Object.keys(CATEGORY_COLORS);
let hiddenCategories = new Set();
let chart = null;
let currentData = HISTOGRAM_DATA;
let filteredData = HISTOGRAM_DATA;
let activeRange = 'MAX';

/* ââ Time-range filtering ââ */

function setRange(range) {
  activeRange = range;
  document.querySelectorAll('.range-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.range === range);
  });

  if (range === 'MAX') {
    filteredData = HISTOGRAM_DATA;
  } else {
    const now = new Date();
    let cutoff;
    if (range === 'YTD') {
      cutoff = new Date(now.getFullYear(), 0, 1);
    } else {
      const map = { '1W': 7, '1M': 30, '3M': 91, '6M': 182 };
      cutoff = new Date(now);
      cutoff.setDate(cutoff.getDate() - map[range]);
    }
    const cutStr = cutoff.toISOString().slice(0, 10);
    filteredData = HISTOGRAM_DATA.filter(r => r.date >= cutStr);
  }
  rebuildData();
  renderStats();
}

/* ââ Grouping ââ */

function getWeek(dateStr) {
  const d = new Date(dateStr);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
}

function rebuildData() {
  const groupBy = document.getElementById('groupBy').value;
  if (groupBy === 'day') {
    currentData = filteredData;
  } else {
    const grouped = {};
    filteredData.forEach(row => {
      const key = groupBy === 'week' ? getWeek(row.date) : row.date.substring(0, 7);
      if (!grouped[key]) { grouped[key] = { date: key }; CATEGORIES.forEach(c => grouped[key][c] = 0); }
      CATEGORIES.forEach(c => grouped[key][c] += (row[c] || 0));
    });
    currentData = Object.values(grouped).sort((a, b) => a.date.localeCompare(b.date));
  }
  updateChart();
  updateTable();
}

/* ââ Chart ââ */

function updateChart() {
  const type = document.getElementById('chartType').value;
  const labels = currentData.map(d => d.date);
  const isLine = type === 'line';
  const isStacked = type === 'bar';

  const datasets = CATEGORIES.filter(c => !hiddenCategories.has(c)).map(cat => ({
    label: cat.charAt(0).toUpperCase() + cat.slice(1),
    data: currentData.map(d => d[cat] || 0),
    backgroundColor: CATEGORY_COLORS[cat].bg,
    borderColor: CATEGORY_COLORS[cat].border,
    borderWidth: isLine ? 2 : 1,
    fill: isLine ? false : undefined,
    tension: 0.3,
    pointRadius: isLine ? 4 : 0,
  }));

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('mainChart'), {
    type: isLine ? 'line' : 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index',
          intersect: false,
          backgroundColor: '#161b22',
          titleColor: '#c9d1d9',
          bodyColor: '#8b949e',
          borderColor: '#30363d',
          borderWidth: 1,
        }
      },
      scales: {
        x: {
          stacked: isStacked,
          grid: { color: 'rgba(48,54,61,0.5)' },
          ticks: { color: '#8b949e', font: { size: 11 } }
        },
        y: {
          stacked: isStacked,
          beginAtZero: true,
          grid: { color: 'rgba(48,54,61,0.5)' },
          ticks: { color: '#8b949e', stepSize: 5, font: { size: 11 } },
          title: { display: true, text: 'Number of Listings', color: '#8b949e' }
        }
      },
      interaction: { mode: 'nearest', axis: 'x', intersect: false }
    }
  });
}

/* ââ Legend ââ */

function toggleCategory(cat) {
  if (hiddenCategories.has(cat)) hiddenCategories.delete(cat);
  else hiddenCategories.add(cat);
  document.querySelectorAll('.legend-chip').forEach(el => {
    el.classList.toggle('muted', hiddenCategories.has(el.dataset.cat));
  });
  updateChart();
}

function toggleAll() {
  if (hiddenCategories.size > 0) hiddenCategories.clear();
  else CATEGORIES.forEach(c => hiddenCategories.add(c));
  document.querySelectorAll('.legend-chip').forEach(el => {
    el.classList.toggle('muted', hiddenCategories.has(el.dataset.cat));
  });
  updateChart();
}

function renderLegend() {
  const el = document.getElementById('legendRow');
  el.innerHTML = CATEGORIES.map(c =>
    `<span class="legend-chip" data-cat="${c}" onclick="toggleCategory('${c}')" style="background:${CATEGORY_COLORS[c].bg};color:#fff">${c}</span>`
  ).join('');
}

/* ââ Stats ââ */

function renderStats() {
  const src = filteredData;
  const totals = {};
  CATEGORIES.forEach(c => totals[c] = 0);
  src.forEach(row => CATEGORIES.forEach(c => totals[c] += (row[c] || 0)));
  const total = Object.values(totals).reduce((a, b) => a + b, 0);

  let html = `<div class="stat-card"><div class="stat-num" style="color:#58a6ff">${total}</div><div class="stat-label">Total Listings</div></div>`;
  html += `<div class="stat-card"><div class="stat-num" style="color:#3fb950">${src.length}</div><div class="stat-label">Days Tracked</div></div>`;
  CATEGORIES.forEach(c => {
    html += `<div class="stat-card"><div class="stat-num" style="color:${CATEGORY_COLORS[c].border}">${totals[c]}</div><div class="stat-label">${c}</div></div>`;
  });
  document.getElementById('statsGrid').innerHTML = html;
}

/* ââ Table ââ */

function updateTable() {
  let html = '<tr><th>Date</th>';
  CATEGORIES.forEach(c => html += `<th>${c}</th>`);
  html += '<th>Total</th></tr>';

  currentData.forEach(row => {
    const total = CATEGORIES.reduce((s, c) => s + (row[c] || 0), 0);
    html += `<tr><td>${row.date}</td>`;
    CATEGORIES.forEach(c => {
      const v = row[c] || 0;
      html += v > 0
          ? `<td style="color:${CATEGORY_COLORS[c].border};cursor:pointer;text-decoration:underline" onclick="openListings('${row.date}','${c}')">${v}</td>`
          : `<td style="color:#30363d">${v}</td>`;
    });
    html += `<td style="font-weight:700">${total}</td></tr>`;
  });
  document.getElementById('dataTable').innerHTML = html;
}

/* ââ Init ââ */
renderLegend();
renderStats();
rebuildData();
document.getElementById('updatedAt').textContent = 'Last updated: ' + new Date(LAST_UPDATED).toLocaleString();
</script>
</body>
</html>
