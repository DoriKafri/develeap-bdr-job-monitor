<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#032229"/>
      <stop offset="50%" style="stop-color:#05323C"/>
      <stop offset="100%" style="stop-color:#0A4A5C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB100"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="200" fill="#32BBD7" opacity="0.08"/>
  <circle cx="100" cy="530" r="150" fill="#FFB100" opacity="0.06"/>
  <circle cx="900" cy="500" r="120" fill="#32BBD7" opacity="0.05"/>
  
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  
  <!-- Logo area -->
  <rect x="60" y="50" width="56" height="56" rx="12" fill="white"/>
  <circle cx="80" cy="68" r="10" fill="#F5A623"/>
  <rect x="70" y="84" width="20" height="20" fill="#222"/>
  <path d="M94 60 L94 104 C108 104 118 94 118 82 C118 70 108 60 94 60Z" fill="#222"/>
  
  <!-- Develeap branding -->
  <text x="130" y="82" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="700" fill="white">Develeap</text>
  <text x="130" y="100" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#32BBD7" font-weight="500">BDR Job Listings Monitor</text>
  
  <!-- Main title -->
  <text x="60" y="210" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="800" fill="white">Job Listings Monitor</text>
  
  <!-- Subtitle -->
  <text x="60" y="260" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#8ECFDB">Real-time tracking of DevOps, Cloud, AI &amp; Security</text>
  <text x="60" y="290" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#8ECFDB">hiring opportunities in Israel</text>
  
  <!-- Category pills -->
  <rect x="60" y="340" width="110" height="36" rx="18" fill="#FFB100" opacity="0.15"/>
  <text x="82" y="364" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFB100">DevOps</text>
  
  <rect x="185" y="340" width="90" height="36" rx="18" fill="#32BBD7" opacity="0.15"/>
  <text x="203" y="364" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#32BBD7">Cloud</text>
  
  <rect x="290" y="340" width="110" height="36" rx="18" fill="#9C27B0" opacity="0.15"/>
  <text x="315" y="364" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#CE93D8">AI / ML</text>
  
  <rect x="415" y="340" width="110" height="36" rx="18" fill="#E44258" opacity="0.15"/>
  <text x="435" y="364" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#EF9A9A">Security</text>
  
  <rect x="540" y="340" width="90" height="36" rx="18" fill="#4CAF50" opacity="0.15"/>
  <text x="560" y="364" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#81C784">Data</text>
  
  <!-- Stats -->
  <rect x="60" y="420" width="320" height="80" rx="12" fill="white" opacity="0.07"/>
  <text x="82" y="450" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#8ECFDB">Active Listings</text>
  <text x="82" y="482" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="white">148+</text>
  
  <rect x="400" y="420" width="320" height="80" rx="12" fill="white" opacity="0.07"/>
  <text x="422" y="450" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#8ECFDB">Companies Tracked</text>
  <text x="422" y="482" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="white">100+</text>
  
  <rect x="740" y="420" width="400" height="80" rx="12" fill="white" opacity="0.07"/>
  <text x="762" y="450" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#8ECFDB">Sources</text>
  <text x="762" y="482" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="white">LinkedIn + Greenhouse + Lever</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="550" width="1200" height="80" fill="white" opacity="0.05"/>
  <text x="60" y="598" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#8ECFDB">dorikafri.github.io/develeap-bdr-job-monitor</text>
  <text x="1060" y="598" font-family="Inter, sans-serif" font-size="14" fill="#5A8A95">Develeap.com</text>
</svg>